name: writing_eval_n42_no_target_ann_loocv_fewshot_with_m_serial
version: '1.1'
description: Base writing evaluation, N42 mixed CEFR holdout. No target annotation,
  LOOCV few-shot calibration, methodology-enabled. Canonical prompt/messages taken
  from best run `20260402_161550` in `base_writing_eval_logs_report_20260403.md` Simplified
  in v1.1 to require label-only CEFR outputs and compact few-shot assistant examples.
metric:
  primary: qwk
  secondary:
  - accuracy
  - adjacent_accuracy
labels:
- A1
- A2
- B1
- B2
- C1
- C2
llm_params:
  temperature: 1.0
  top_p: 0.95
  max_tokens: null
prompt_template: '{prompt}'
answer_regex: \b(A1|A2|B1|B2|C1|C2)\b
