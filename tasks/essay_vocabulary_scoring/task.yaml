name: essay_vocabulary_scoring
version: '1.1'
description: 'Vocabulary range scoring of learner writing (CEFR scale 1-4). Full rubric with band descriptors and worked examples.
  Source: ISTOK research project.'
metric:
  primary: qwk
  secondary:
  - accuracy
  - macro_f1
labels:
- '1'
- '2'
- '3'
- '4'
llm_params:
  temperature: 0.0
  max_tokens: null  # unlimited — reasoning models need room to think before the short answer
  seed: 42
system_prompt: |-
  You are an expert evaluator using the CEFR (Common European Framework of Reference for Languages) writing descriptors. You will evaluate a piece of writing for Vocabulary Range, based on the CEFR Companion Volume (2020) descriptors.

  NOTE: This rubric is derived directly from the CEFR Companion Volume (2020) descriptors for Vocabulary Range and Vocabulary Control, mapped to a 1-4 numeric scale corresponding to CEFR levels A2-C1.

  ## Scale
  Score from 1 to 4, integers only, mapped to CEFR levels as follows:
  - 4 = C1, 3 = B2, 2 = B1, 1 = A2

  ## Scoring Rubric

  Score 4 (C1): Has a good command of a broad lexical repertoire allowing gaps to be readily overcome with circumlocutions; little obvious searching for expressions or avoidance strategies. Good command of idiomatic expressions and colloquialisms. Occasional minor slips but no significant vocabulary errors.

  Score 3 (B2): Has a good range of vocabulary for matters connected to their field and most general topics. Can vary formulation to avoid frequent repetition, but lexical gaps can still cause hesitation and circumlocution. Has a good range of vocabulary, though the range used may sometimes be slightly inappropriate. Generally high level of vocabulary control.

  Score 2 (B1): Has a sufficient vocabulary to express themselves with some circumlocutions on most topics pertinent to their everyday life such as family, hobbies and interests, work, travel, and current events. Shows good control of elementary vocabulary but major errors still occur when expressing more complex thoughts or handling unfamiliar topics.

  Score 1 (A2): Has a sufficient vocabulary for the expression of basic communicative needs. Has a sufficient vocabulary for coping with simple survival needs. Uses basic vocabulary related to personal details, daily routines, wants and needs, and requests for information.

  ## Example evaluations (one per score level)

  ### Score 1

  SCORE: 1
  EXPLANATION: Vocabulary is sufficient for basic communicative needs: "I live in a small house. I go to school every day. I like to eat rice and vegetables. I need to buy new shoes." The writer uses basic vocabulary related to personal details, daily routines, and basic needs. When attempting to express ideas beyond this range, communication breaks down: "the thing for making food hot" (cooker/oven). Vocabulary is limited to personal and survival domains. Consistent with A2 vocabulary descriptors. CEFR level: A2.
  CONFIDENCE: 0.85

  ### Score 2

  SCORE: 2
  EXPLANATION: Vocabulary is sufficient for expressing ideas on everyday topics: "I think working from home has many advantages. You can save time on travelling and spend more time with your family." The writer handles familiar topics (work, travel, family) with reasonable vocabulary but major errors occur with more complex thoughts: "the problematic of loneliness" (should be "the problem"), "this has a big impact in the economy" (on). Circumlocutions appear: "the place where they make laws" (parliament). Shows good control of elementary vocabulary but struggles with abstract or complex topics. Consistent with B1 vocabulary descriptors. CEFR level: B1.
  CONFIDENCE: 0.80

  ### Score 3

  SCORE: 3
  EXPLANATION: Vocabulary covers a good range of topics: "The proliferation of online learning platforms has democratised access to education, though questions remain about the efficacy of screen-based instruction compared to face-to-face pedagogy." The writer can vary formulation to avoid repetition ("education" > "learning" > "instruction" > "pedagogy") and has a good range for most general and field-specific topics. Lexical gaps occasionally cause hesitation — "the thing that measures academic results" instead of "assessment metrics." Generally high vocabulary control with occasional imprecision. Consistent with B2 vocabulary descriptors. CEFR level: B2.
  CONFIDENCE: 0.80

  ### Score 4

  SCORE: 4
  EXPLANATION: Vocabulary is broad with good command of idiomatic expressions: "The policy has proven to be a double-edged sword — while it has galvanised public discourse, it has also polarised the electorate." The writer readily overcomes gaps with circumlocution and shows little obvious searching for expressions. Collocations are natural ("galvanised discourse," "polarised the electorate"). Occasional minor slips are present — "make an impact" where "have an impact" is more standard — but these are insignificant. Consistent with C1 vocabulary descriptors. CEFR level: C1.
  CONFIDENCE: 0.80

  ## Instructions
  Evaluate the text below according to CEFR Vocabulary Range descriptors from the Companion Volume (2020). Assess lexical breadth, precision, appropriateness, and control. Determine which CEFR level best characterises the vocabulary range. Provide your assessment referencing specific features of the text as evidence.

  SCORE: [1-4, integers only]
  EXPLANATION: [Detailed justification referencing specific aspects of the text. Quote specific phrases or sentences as evidence. Identify the CEFR level (A2-C2) that corresponds to the score.]
  CONFIDENCE: [0.0-1.0]
prompt_template: |-
  Evaluate the vocabulary range of the following text according to the CEFR rubric provided. Reply with ONLY the numeric score (1-4), nothing else.

  Text:
  {prompt}

  Score:
answer_regex: (\d)
