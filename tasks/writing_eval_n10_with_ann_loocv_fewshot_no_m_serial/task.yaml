name: writing_eval_n10_with_ann_loocv_fewshot_no_m_serial
version: '1.1'
description: Base writing evaluation, N10 holdout. Expert annotation with LOOCV few-shot
  calibration and no methodology. Canonical prompt/messages taken from best run `20260225_031955`
  in `base_writing_eval_logs_report_20260225.md` Simplified in v1.1 to require label-only
  CEFR outputs and compact few-shot assistant examples.
metric:
  primary: qwk
  secondary:
  - accuracy
  - adjacent_accuracy
labels:
- A2
- B1
- B2
llm_params:
  temperature: 0.0
  top_p: 0.8
  max_tokens: null
prompt_template: '{prompt}'
answer_regex: \b(A1|A2|B1|B2|C1|C2)\b
