name: writing_eval_b1b2_with_ann_with_m_serial
version: '1.1'
description: Base writing evaluation, B1/B2 boundary holdout. Expert annotation with
  full methodology prompt family. Canonical prompt/messages taken from best run `20260417_055035`
  in `base_writing_eval_b1b2_logs_report_20260417.md` Simplified in v1.1 to require
  label-only CEFR outputs and compact few-shot assistant examples.
metric:
  primary: boundary_accuracy
  secondary:
  - accuracy
  - qwk
  - boundary_kappa
  - signed_diff
labels:
- B1
- B2
llm_params:
  temperature: 0.0
  top_p: 0.95
  max_tokens: null
prompt_template: '{prompt}'
answer_regex: \b(A1|A2|B1|B2|C1|C2)\b
