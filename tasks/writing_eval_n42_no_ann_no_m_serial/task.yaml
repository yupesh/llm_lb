name: writing_eval_n42_no_ann_no_m_serial
version: '1.0'
description: Base writing evaluation, N42 mixed CEFR holdout. No expert annotation,
  no methodology, single-pass prompt family. Canonical prompt/messages taken from
  best run `20260402_171309` in `base_writing_eval_logs_report_20260403.md`.
metric:
  primary: qwk
  secondary:
  - accuracy
  - adjacent_accuracy
labels:
- A1
- A2
- B1
- B2
- C1
- C2
llm_params:
  temperature: 1.0
  top_p: 0.95
  max_tokens: 16384
prompt_template: '{prompt}'
answer_regex: \b(A1|A2|B1|B2|C1|C2)\b
