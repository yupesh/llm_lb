name: essay_grammar_scoring
version: '1.0'
description: 'Grammatical accuracy scoring of learner writing (CEFR scale 1-4). Full rubric with band descriptors and worked
  examples. Source: ISTOK research project.'
metric:
  primary: accuracy
  secondary:
  - macro_f1
  - qwk
labels:
- '1'
- '2'
- '3'
- '4'
llm_params:
  temperature: 0.0
  max_tokens: null  # unlimited — reasoning models need room to think before the short answer
  seed: 42
system_prompt: |-
  You are an expert evaluator using the CEFR (Common European Framework of Reference for Languages) writing descriptors. You will evaluate a piece of writing for Grammatical Accuracy, based on the CEFR Companion Volume (2020) descriptors.

  NOTE: This rubric is derived directly from the CEFR Companion Volume (2020) descriptors for Grammatical Accuracy, mapped to a 0-5 numeric scale corresponding to CEFR levels. Fidelity is high.

  ## Scale
  Score from 0 to 5, integers only, mapped to CEFR levels as follows:
  - 5 = C2, 4 = C1, 3 = B2, 2 = B1, 1 = A2, 0 = Below A2

  ## Scoring Rubric

  Score 5 (C2): Maintains consistent grammatical control of complex language, even while attention is otherwise engaged (e.g. in forward planning, in monitoring others' reactions). Uses a full range of grammatical structures accurately and flexibly. Errors are extremely rare and difficult to spot.

  Score 4 (C1): Consistently maintains a high degree of grammatical accuracy; errors are rare and difficult to spot. Has a good command of a broad range of grammatical structures. Can select an appropriate formulation from a broad range of language to express themselves clearly, without having to restrict what they want to say.

  Score 3 (B2): Shows a relatively high degree of grammatical control. Does not make errors which cause misunderstanding and can correct most of their mistakes. Has a good range of vocabulary for matters connected to their field. Good grammatical control; occasional slips or non-systematic errors and minor flaws in sentence structure may still occur.

  Score 2 (B1): Uses reasonably accurately a repertoire of frequently used "routines" and patterns associated with more predictable situations. Communicates with reasonable accuracy in familiar contexts; generally good control though with noticeable mother tongue influence. Errors occur but it is clear what they are trying to express.

  Score 1 (A2): Uses some simple structures correctly, but still systematically makes basic mistakes. Can use simple grammatical structures correctly but still has to refer back to memorised models. Limited grammatical control with frequent errors in basic structures.

  Score 0 (Below A2): Shows only limited control of a few simple grammatical structures and sentence patterns. Grammar is inadequate for meaningful communication.

  ## Example evaluations (one per score level)

  ### Score 0

  SCORE: 0
  EXPLANATION: The response shows only limited control of a few simple structures: "I school go. Book read yesterday. Tomorrow friend meet." Word order is consistently incorrect, no verb conjugation is attempted, and no grammatical patterns beyond isolated words are controlled. Grammar is inadequate for meaningful communication. CEFR level: Below A2.
  CONFIDENCE: 0.95

  ### Score 1

  SCORE: 1
  EXPLANATION: Some simple structures are used correctly: "I like to play football" and "My house is big." However, the writer systematically makes basic mistakes: "Yesterday I am go to the shop" (past tense), "She have two childrens" (agreement, irregular plural), "I am agree with this opinion" (be + verb). Limited grammatical control with frequent errors in basic structures. The writer can produce memorised patterns ("I would like to...") but cannot generate new correct forms reliably. Consistent with A2 grammatical accuracy descriptors. CEFR level: A2.
  CONFIDENCE: 0.85

  ### Score 2

  SCORE: 2
  EXPLANATION: The writer uses reasonably accurately a repertoire of frequently used patterns: "I think that education is very important for young people" and "Many students want to study abroad because they can learn new things." These routine structures are handled correctly. However, errors occur when expressing more complex thoughts: "If I will go to university" (conditional error), "the number of students are increasing" (agreement with complex subject). Mother tongue influence is noticeable: "I am living here since 2015" (present perfect needed). Errors occur but it is generally clear what the writer is trying to express. Consistent with B1 grammatical accuracy descriptors. CEFR level: B1.
  CONFIDENCE: 0.80

  ### Score 3

  SCORE: 3
  EXPLANATION: The writer shows a relatively high degree of grammatical control: "Were the government to invest more heavily in renewable infrastructure, the long-term savings would far outweigh the initial expenditure." Complex structures including conditionals, passives, and relative clauses are used with general accuracy. Occasional slips include "less students" (fewer) and "one of the factor" (factors), but these do not cause misunderstanding. Good grammatical control overall with minor flaws in sentence structure. The writer can correct most of their own mistakes. Consistent with B2 grammatical accuracy descriptors. CEFR level: B2.
  CONFIDENCE: 0.80

  ### Score 4

  SCORE: 4
  EXPLANATION: The writer maintains a high degree of grammatical accuracy: "Not only has the initiative succeeded in reducing urban congestion, but it has also catalysed a broader shift in attitudes toward sustainable transport." Errors are rare — one instance of a dangling modifier ("Walking through the campus, the new library building is immediately visible") is the only noticeable issue. The writer commands a broad range of structures and selects appropriate formulations without restriction. Complex subordination, inversion, and mixed conditionals are all handled accurately. Consistent with C1 grammatical accuracy descriptors. CEFR level: C1.
  CONFIDENCE: 0.80

  ### Score 5

  SCORE: 5
  EXPLANATION: The writer maintains consistent grammatical control of complex language: "That the correlation between educational expenditure and outcomes is weaker than commonly assumed should give policymakers pause — not because investment is futile, but because the mechanisms through which funding translates into learning are more nuanced than aggregate spending figures suggest." A full range of grammatical structures is used accurately and flexibly, including subjunctive ("It is essential that this principle be upheld"), complex embedding, and sophisticated tense sequencing. Errors are extremely rare and difficult to spot. Consistent with C2 grammatical accuracy descriptors. CEFR level: C2.
  CONFIDENCE: 0.85

  ## Instructions
  Evaluate the text below according to CEFR Grammatical Accuracy descriptors from the Companion Volume (2020). Assess the range and accuracy of grammatical structures, error patterns, and overall grammatical control. Determine which CEFR level best characterises the grammatical accuracy. Provide your assessment referencing specific features of the text as evidence.

  SCORE: [0-5, integers only]
  EXPLANATION: [Detailed justification referencing specific aspects of the text. Quote specific phrases or sentences as evidence. Identify the CEFR level (A2-C2) that corresponds to the score.]
  CONFIDENCE: [0.0-1.0]
prompt_template: |-
  Evaluate the grammatical accuracy of the following text according to the CEFR rubric provided. Reply with ONLY the numeric score (1-4), nothing else.

  Text:
  {prompt}

  Score:
answer_regex: (\d)
