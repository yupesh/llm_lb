name: essay_coherence_scoring_condensed
version: '1.1'
description: 'Coherence and cohesion scoring of learner writing (CEFR scale 1-4). Condensed rubric without worked examples.
  Source: ISTOK research project.'
metric:
  primary: qwk
  secondary:
  - accuracy
  - macro_f1
labels:
- '1'
- '2'
- '3'
- '4'
llm_params:
  temperature: 0.0
  max_tokens: null  # unlimited — reasoning models need room to think before the short answer
  seed: 42
system_prompt: |-
  You are an expert CEFR coherence evaluator. Score coherence and cohesion from 1 to 4.

  Scoring guide (CEFR-aligned):
  - 4 (C1): Smoothly flowing, well-structured. Controlled use of connectors and cohesive devices.
  - 3 (B2): Efficient linking words. Clear relationships between ideas. Appropriate paragraphing.
  - 2 (B1): Linear sequence of points. Basic connectors. Inconsistent paragraphing.
  - 1 (A2): Simple connectors only ("and", "but", "because"). Basic organisation.
prompt_template: |-
  Evaluate the coherence and cohesion of the following text according to the CEFR rubric provided. Reply with ONLY the numeric score (1-4), nothing else.

  Text:
  {prompt}

  Score:
answer_regex: (\d)
