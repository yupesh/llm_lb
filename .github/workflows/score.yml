name: score

# Manually triggered scoring run. Produces a result file in tasks/<task>/results/,
# rebuilds leaderboards + data/index.json, and opens a PR for an admin to merge.
#
# Two execution modes:
#   - github       — runs on ubuntu-latest. Suitable for hosted-API providers
#                    (OpenAI, HF Inference) where the secret keys live in repo
#                    settings. Do NOT use for models that need a GPU.
#   - self-hosted  — runs on a runner with the `score-runner` label. Use this
#                    for vLLM/TGI/local inference where you control the box.

on:
  workflow_dispatch:
    inputs:
      task:
        description: "Path to task directory (e.g. tasks/text_classification)"
        required: true
      model:
        description: "Path to model YAML (e.g. models/gpt-4o-mini@openai.yaml)"
        required: true
      runner:
        description: "Where to run"
        required: true
        default: github
        type: choice
        options: [github, self-hosted]

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  score:
    runs-on: ${{ github.event.inputs.runner == 'self-hosted' && fromJSON('["self-hosted","score-runner"]') || fromJSON('["ubuntu-latest"]') }}
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install runner
        working-directory: runner
        run: uv sync --frozen

      - name: Materialise task context files from secrets
        # Some tasks reference a `context_file` in task.yaml that's NOT
        # checked in (e.g. third-party DB schemas we can't re-upload to
        # GitHub). For each such task, we decode a gzip+base64 GitHub
        # Secret into the expected path. Missing secret → file not written
        # → runner degrades gracefully with empty {context}.
        env:
          AMBROSIA_SCHEMAS_B64: ${{ secrets.AMBROSIA_SCHEMAS_B64 }}
        run: |
          if [ -n "${AMBROSIA_SCHEMAS_B64:-}" ] && [ -d tasks/text2sql_ambiguity ]; then
            echo "$AMBROSIA_SCHEMAS_B64" | base64 -d | gunzip > tasks/text2sql_ambiguity/db_schemas.json
            echo "wrote tasks/text2sql_ambiguity/db_schemas.json ($(wc -c < tasks/text2sql_ambiguity/db_schemas.json) bytes)"
          fi

      - name: Run model against task
        working-directory: runner
        env:
          # Add every secret that model cards reference via `api_key_env`.
          # Missing secrets are silently empty — only the relevant one matters.
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          LLM_LB_API_KEY: ${{ secrets.LLM_LB_API_KEY }}
          VLLM_PROXY_KEY: ${{ secrets.VLLM_PROXY_KEY }}
          # Judge model env vars (used by models/judge@openai.yaml)
          JUDGE_BASE_URL: ${{ secrets.JUDGE_BASE_URL }}
          JUDGE_API_KEY: ${{ secrets.JUDGE_API_KEY }}
          JUDGE_MODEL_NAME: ${{ secrets.JUDGE_MODEL_NAME }}
        run: |
          uv run llm-lb run \
            --task "../${{ github.event.inputs.task }}" \
            --model "../${{ github.event.inputs.model }}"

      # Aggregation (leaderboards + global index + feed) is NOT done here to
      # keep score-PRs conflict-free: generated files would clash with every
      # other in-flight score-PR. Aggregation runs as a separate workflow
      # (.github/workflows/aggregate.yml) on pushes to main that touch
      # tasks/*/results/**.

      - name: Open PR with results
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "score: ${{ github.event.inputs.model }} on ${{ github.event.inputs.task }}"
          title: "score: ${{ github.event.inputs.model }} on ${{ github.event.inputs.task }}"
          branch: score/${{ github.run_id }}
          labels: score
          # Only commit the new result file. Anything else the runner may have
          # touched (schemas materialised from secrets, caches, etc.) stays out
          # of the PR.
          add-paths: |
            tasks/*/results/**
          body: |
            Automated scoring run.

            - **Task:** `${{ github.event.inputs.task }}`
            - **Model:** `${{ github.event.inputs.model }}`
            - **Runner:** `${{ github.event.inputs.runner }}`
            - **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Requires admin review (see CODEOWNERS). Leaderboards + global
            index are refreshed automatically by the `aggregate` workflow
            right after this PR is merged to main.
