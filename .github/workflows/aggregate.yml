name: aggregate

# Refresh generated artifacts (data/feed.xml, data/index.json, and each task's
# leaderboard.json) after a score-PR lands on main. Score-PRs deliberately
# commit ONLY the raw result file under tasks/<task>/results/*.json — they
# don't touch generated files, which keeps multiple in-flight score-PRs from
# conflicting with each other on feed.xml / index.json.
#
# Path filter ensures we only run when a new result file shows up (or is
# manually requested via workflow_dispatch). The workflow's OWN commit
# touches data/** and **/leaderboard.json — NOT tasks/*/results/** — so it
# does not re-trigger itself.
#
# Requires:
#   - `contents: write` (declared below)
#   - A repo Deploy key with write access, whose private half is stored as
#     the `AGGREGATE_DEPLOY_KEY` secret, and whose public half is listed in
#     the `main` ruleset's bypass list. The built-in `GITHUB_TOKEN` /
#     `github-actions[bot]` cannot be added to Rulesets bypass on every repo
#     (depends on the account), so we use a Deploy key instead — it's
#     repo-scoped and shows up in the bypass picker explicitly.
#     Without this setup the final `git push` will fail and leaderboards
#     will stay stale until a human runs aggregate.

on:
  push:
    branches: [main]
    paths:
      # Fire on anything that affects leaderboard/index content:
      # new result files, new/renamed tasks, sample count changes.
      - 'tasks/**'
      # NOT data/** or **/leaderboard.json — those ARE the workflow's output,
      # matching them would self-trigger.
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: aggregate-main
  cancel-in-progress: false

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # Need full history so aggregate can walk every result file.
          fetch-depth: 0
          # SSH deploy key so the later `git push origin HEAD:main` goes
          # through under the deploy-key identity (present in the `main`
          # ruleset bypass list). actions/checkout rewrites the `origin`
          # remote to the SSH URL and writes the key to ~/.ssh.
          ssh-key: ${{ secrets.AGGREGATE_DEPLOY_KEY }}

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install runner
        working-directory: runner
        run: uv sync --frozen

      - name: Run aggregate
        working-directory: runner
        run: uv run llm-lb aggregate --root ..

      - name: Commit regenerated artifacts
        run: |
          set -eu
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          refresh_and_stage() {
            (
              cd runner
              uv run llm-lb aggregate --root ..
            )
            # Stage only the files aggregate is allowed to produce. Anything
            # else must not sneak in.
            git add data/ || true
            git add 'tasks/*/leaderboard.json' || true
          }

          commit_if_needed() {
            if git diff --cached --quiet; then
              return 1
            fi
            git commit -m "aggregate: refresh leaderboards + index"
            return 0
          }

          refresh_and_stage
          if ! commit_if_needed; then
            echo "nothing to aggregate — skipping commit"
            exit 0
          fi

          # Race guard: between our checkout and this push, main may advance
          # with new result files. These generated artifacts should be rebuilt
          # from the latest tree, not rebased like hand-written source files.
          i=0
          until git push origin HEAD:main; do
            i=$((i + 1))
            if [ "$i" -ge 5 ]; then
              echo "::error::push failed after $i attempts"
              exit 1
            fi
            echo "push rejected, rebuilding aggregate on top of origin/main (attempt $i/5)"
            git fetch origin main
            git reset --hard origin/main
            refresh_and_stage
            if ! commit_if_needed; then
              echo "upstream already contains the latest aggregate output"
              exit 0
            fi
            sleep $((RANDOM % 3 + 1))
          done
