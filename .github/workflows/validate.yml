name: validate

on:
  pull_request:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install runner
        working-directory: runner
        # --frozen: fail if uv.lock is out of sync with pyproject.toml.
        # Pins versions so CI matches developer machines and `aggregate` is
        # byte-stable across environments.
        run: uv sync --frozen

      - name: Lint
        working-directory: runner
        run: uv run ruff check .

      - name: Run tests (incl. dummy end-to-end)
        working-directory: runner
        run: uv run pytest -q

      - name: Validate all tasks
        working-directory: runner
        shell: bash
        run: |
          set -e
          shopt -s nullglob
          for d in ../tasks/*/; do
            uv run llm-lb validate "$d"
          done

      - name: Validate all model cards
        working-directory: runner
        shell: bash
        run: |
          set -e
          shopt -s nullglob
          for f in ../models/*.yaml; do
            uv run llm-lb validate "$f"
          done

      - name: Verify schemas/ is up-to-date with pydantic models
        working-directory: runner
        run: |
          uv run llm-lb export-schemas --out-dir ../schemas
          if [ -n "$(git status --porcelain ../schemas)" ]; then
            echo "::error::schemas/ is out of date — run 'uv run llm-lb export-schemas --out-dir ../schemas' and commit"
            git --no-pager diff ../schemas
            exit 1
          fi

      - name: Aggregate smoke-check (result files parseable)
        working-directory: runner
        # Runs aggregate to catch malformed result JSON / broken task specs
        # that would blow up on main. Does NOT assert the output matches
        # HEAD: generated artifacts (data/**, **/leaderboard.json) are
        # produced by the `aggregate` workflow on pushes to main, not by
        # contributors. A stale HEAD is expected and fine.
        run: uv run llm-lb aggregate --root ..

      - name: Ensure PR does not hand-edit bot-managed artifacts
        # data/** and **/leaderboard.json are written only by the `aggregate`
        # workflow (github-actions[bot] pushing directly to main). Any PR
        # touching them would be overwritten on the next aggregate run, and
        # the intent is almost certainly a mistake. Block it early.
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # Ensure we have the base commit locally (checkout@v5 fetches
          # shallow by default).
          git fetch --no-tags --depth=50 origin "$BASE_SHA" || true
          bad=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" \
                 | grep -E '^(data/|tasks/[^/]+/leaderboard\.json$)' || true)
          if [ -n "$bad" ]; then
            echo "::error::PR modifies bot-managed files:"
            echo "$bad"
            echo "These files are regenerated by the 'aggregate' workflow on main."
            echo "Drop them from your commit and re-push."
            exit 1
          fi
