name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

# Opt into Node.js 24 for actions that still ship a Node.js 20 runtime
# (configure-pages, deploy-pages, ...). Required from June 2026; harmless now.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install site dependencies
        working-directory: site
        run: bun install --frozen-lockfile

      - name: Build site (prebuild syncs ../data/index.json into public/)
        working-directory: site
        run: bun run build

      # `enablement: true` turns Pages on for the repo if it isn't already,
      # so the workflow doesn't fail on a fresh repo with "Get Pages site failed".
      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

      - id: deploy
        uses: actions/deploy-pages@v4
